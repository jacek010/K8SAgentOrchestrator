{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "k8s-agent-orchestrator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-agent-orchestrator.labels" . | nindent 4 }}
rules:
  # ── Manage Agent CRs ─────────────────────────────────────────────────────
  - apiGroups:
      - orchestrator.dev
    resources:
      - agents
      - agents/status
      - agents/finalizers
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  # ── Manage Pods (agent workloads) ─────────────────────────────────────────
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  # ── Read Pod logs ─────────────────────────────────────────────────────────
  - apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get

  # ── Leader election (ConfigMaps/Leases) ───────────────────────────────────
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  # ── Events ────────────────────────────────────────────────────────────────
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch

  {{- with .Values.rbac.extraRules }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
