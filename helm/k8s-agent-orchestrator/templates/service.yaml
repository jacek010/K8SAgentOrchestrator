apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-agent-orchestrator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-agent-orchestrator.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "k8s-agent-orchestrator.selectorLabels" . | nindent 4 }}
  ports:
    - name: rest-api
      port: {{ .Values.service.restPort }}
      targetPort: rest-api
      protocol: TCP
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
