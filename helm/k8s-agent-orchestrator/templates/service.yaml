apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-agent-orchestrator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-agent-orchestrator.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "k8s-agent-orchestrator.selectorLabels" . | nindent 4 }}
  ports:
    - name: rest-api
      port: {{ .Values.service.restPort | default 8082 }}
      targetPort: rest-api
      protocol: TCP
    - name: metrics
      port: {{ .Values.service.metricsPort | default 8080 }}
      targetPort: metrics
      protocol: TCP
    - name: ui
      port: {{ .Values.service.uiPort | default 8083 }}
      targetPort: ui
      protocol: TCP 
