---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agents.orchestrator.dev
  labels:
    app.kubernetes.io/managed-by: k8s-agent-orchestrator
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: orchestrator.dev
  names:
    kind: Agent
    listKind: AgentList
    plural: agents
    singular: agent
    shortNames:
      - agt
    categories:
      - all
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Pod
          type: string
          jsonPath: .status.podName
        - name: Image
          type: string
          jsonPath: .spec.image
        - name: HealingOff
          type: boolean
          jsonPath: .spec.selfHealingDisabled
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          description: Agent is the Schema for the agents API.
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: AgentSpec defines the desired state of an Agent.
              type: object
              required:
                - image
              properties:
                image:
                  description: Image is the container image to run.
                  type: string
                imagePullPolicy:
                  description: "ImagePullPolicy for the container. Defaults to IfNotPresent."
                  type: string
                  enum:
                    - Always
                    - Never
                    - IfNotPresent
                imagePullSecrets:
                  description: ImagePullSecrets is an optional list of references to secrets.
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                env:
                  description: Env is a list of environment variables to inject into the agent container.
                  type: array
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                      valueFrom:
                        type: object
                        properties:
                          configMapKeyRef:
                            type: object
                            properties:
                              key:
                                type: string
                              name:
                                type: string
                              optional:
                                type: boolean
                            required:
                              - key
                          fieldRef:
                            type: object
                            properties:
                              apiVersion:
                                type: string
                              fieldPath:
                                type: string
                            required:
                              - fieldPath
                          resourceFieldRef:
                            type: object
                            properties:
                              containerName:
                                type: string
                              divisor:
                                anyOf:
                                  - type: integer
                                  - type: string
                                x-kubernetes-int-or-string: true
                              resource:
                                type: string
                            required:
                              - resource
                          secretKeyRef:
                            type: object
                            properties:
                              key:
                                type: string
                              name:
                                type: string
                              optional:
                                type: boolean
                            required:
                              - key
                envFrom:
                  description: EnvFrom lists sources to populate environment variables.
                  type: array
                  items:
                    type: object
                    properties:
                      configMapRef:
                        type: object
                        properties:
                          name:
                            type: string
                          optional:
                            type: boolean
                      prefix:
                        type: string
                      secretRef:
                        type: object
                        properties:
                          name:
                            type: string
                          optional:
                            type: boolean
                resources:
                  description: Resources specifies resource requirements.
                  type: object
                  properties:
                    limits:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    requests:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                serviceAccountName:
                  description: ServiceAccountName is the name of the ServiceAccount.
                  type: string
                command:
                  description: Command overrides the ENTRYPOINT of the container.
                  type: array
                  items:
                    type: string
                args:
                  description: Args overrides the CMD of the container.
                  type: array
                  items:
                    type: string
                volumes:
                  description: Volumes defines additional volumes to mount.
                  type: array
                  x-kubernetes-preserve-unknown-fields: true
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                volumeMounts:
                  description: VolumeMounts defines additional volume mounts.
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                restartPolicy:
                  description: RestartPolicy for the agent Pod.
                  type: string
                  enum:
                    - Always
                    - OnFailure
                    - Never
                podLabels:
                  description: Labels to add to the agent Pod.
                  type: object
                  additionalProperties:
                    type: string
                podAnnotations:
                  description: Annotations to add to the agent Pod.
                  type: object
                  additionalProperties:
                    type: string
                paused:
                  description: Paused, when true, prevents the controller from creating or recreating the Pod.
                  type: boolean
                selfHealingDisabled:
                  description: SelfHealingDisabled, when true, turns off automatic resurrection of this Agent CR. Default false means self-healing is ON.
                  type: boolean
                idleTimeout:
                  description: IdleTimeout is the number of seconds of inactivity after which the orchestrator automatically pauses this agent. 0 disables idle tracking.
                  type: integer
                  format: int32
                  minimum: 0
                servicePort:
                  description: ServicePort, when greater than 0, causes the controller to create a ClusterIP Service on that port.
                  type: integer
                  format: int32
                  minimum: 1
                  maximum: 65535
                serviceProtocol:
                  description: ServiceProtocol is the network protocol for the Service port. Defaults to TCP.
                  type: string
                  enum:
                    - TCP
                    - UDP
                    - SCTP
            status:
              description: AgentStatus defines the observed state of an Agent.
              type: object
              properties:
                phase:
                  description: Phase is the current lifecycle phase.
                  type: string
                podName:
                  description: PodName is the name of the Pod currently managing this agent.
                  type: string
                podIP:
                  description: PodIP is the IP address of the current agent Pod.
                  type: string
                message:
                  description: Message provides a human-readable description of the current status.
                  type: string
                observedGeneration:
                  description: ObservedGeneration is the most recent generation observed.
                  type: integer
                  format: int64
                lastUpdated:
                  description: LastUpdated is the time of the last status update.
                  type: string
                  format: date-time
                conditions:
                  description: Conditions represents the latest available observations.
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                restoredAt:
                  description: RestoredAt is set when this Agent CR was resurrected by the self-healing mechanism.
                  type: string
                  format: date-time
                restoredFrom:
                  description: RestoredFrom is the original Agent name that was deleted and triggered this resurrection.
                  type: string
                serviceName:
                  description: ServiceName is the name of the ClusterIP Service created for this agent. Populated only when spec.servicePort > 0.
                  type: string
